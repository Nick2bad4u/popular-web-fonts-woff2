# Release pipeline for nerd-fonts-woff2.
# - Assumes WOFF2 assets are committed in-repo (for raw GitHub/jsDelivr usage).
# - Publishes npm package via trusted publishing (OIDC) when package is not private.
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Release

run-name: Release • ${{ github.ref_name }} @${{ github.actor }}

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            release_type:
                description: "Release bump type"
                required: true
                default: patch
                type: choice
                options:
                    - patch
                    - minor
                    - major
            version:
                description: "Explicit release version in x.y.z format (overrides release_type)"
                required: false
                type: string
            ref:
                description: "Branch to release from when running manually"
                required: false
                default: main
                type: string

permissions:
    contents: read

concurrency:
    group: "${{ github.workflow }}-${{ github.repository }}"
    cancel-in-progress: true

jobs:
    release:
        name: Publish npm + GitHub release
        if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
        runs-on: ubuntu-latest
        timeout-minutes: 45
        permissions:
            contents: write
            id-token: write
        defaults:
            run:
                shell: bash
        env:
            NPM_REGISTRY_URL: "https://registry.npmjs.org"
            DEFAULT_RELEASE_BRANCH: "main"
        outputs:
            tag: ${{ steps.meta.outputs.tag }}
            version: ${{ steps.meta.outputs.version }}
            package_name: ${{ steps.meta.outputs.package_name }}
            package_private: ${{ steps.meta.outputs.package_private }}

        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
              with:
                  egress-policy: audit

            - name: Resolve target ref
              id: target
              env:
                  DISPATCH_REF: ${{ inputs.ref }}
              run: |
                  set -euo pipefail
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    branch="${DISPATCH_REF:-$DEFAULT_RELEASE_BRANCH}"
                    branch="${branch#refs/heads/}"
                    echo "ref=$branch" >> "$GITHUB_OUTPUT"
                    echo "branch=$branch" >> "$GITHUB_OUTPUT"
                  else
                    echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
                    echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  fetch-tags: true
                  ref: ${{ steps.target.outputs.ref }}

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .node-version
                  registry-url: ${{ env.NPM_REGISTRY_URL }}
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Validate committed asset tree
              run: |
                  set -euo pipefail
                  if [ ! -d "fonts/woff2" ]; then
                    echo "Expected committed assets under fonts/woff2 for raw GitHub/jsDelivr links." >&2
                    exit 1
                  fi

                  count=$(find fonts/woff2 -type f -name '*.woff2' | wc -l | tr -d ' ')
                  if [ "$count" -eq 0 ]; then
                    echo "No .woff2 files found in fonts/woff2. Commit assets before releasing." >&2
                    exit 1
                  fi

            - name: Validate release input
              if: github.event_name == 'workflow_dispatch'
              env:
                  EXPLICIT_VERSION: ${{ inputs.version }}
                  RELEASE_TYPE: ${{ inputs.release_type }}
              run: |
                  set -euo pipefail
                  if [ -n "${EXPLICIT_VERSION:-}" ]; then
                    if [[ ! "$EXPLICIT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "Invalid version '$EXPLICIT_VERSION'. Use x.y.z format." >&2
                      exit 1
                    fi
                    exit 0
                  fi

                  case "${RELEASE_TYPE:-patch}" in
                    patch|minor|major) exit 0 ;;
                    *)
                      echo "Invalid release_type '${RELEASE_TYPE:-}'. Allowed: patch, minor, major." >&2
                      exit 1
                      ;;
                  esac

            - name: Verify project quality gates
              run: npm run release:check

            - name: Resolve release metadata
              id: meta
              env:
                  EXPLICIT_VERSION: ${{ inputs.version }}
                  RELEASE_TYPE: ${{ inputs.release_type }}
              run: |
                  set -euo pipefail

                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    if [ -n "${EXPLICIT_VERSION:-}" ]; then
                      npm version "$EXPLICIT_VERSION" --no-git-tag-version
                    else
                      npm version "${RELEASE_TYPE:-patch}" --no-git-tag-version
                    fi
                    version=$(node -p "require('./package.json').version")
                  else
                    version="${GITHUB_REF_NAME#v}"
                    package_version=$(node -p "require('./package.json').version")
                    if [ "$version" != "$package_version" ]; then
                      echo "Tag version ($version) does not match package.json ($package_version)." >&2
                      exit 1
                    fi
                  fi

                  package_name=$(node -p "require('./package.json').name")
                  package_private=$(node -p "String(Boolean(require('./package.json').private))")
                  tag="v${version}"

                  echo "version=$version" >> "$GITHUB_OUTPUT"
                  echo "tag=$tag" >> "$GITHUB_OUTPUT"
                  echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
                  echo "package_private=$package_private" >> "$GITHUB_OUTPUT"

            - name: Configure git
              if: github.event_name == 'workflow_dispatch'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Commit and push release version + tag
              if: github.event_name == 'workflow_dispatch'
              env:
                  TAG: ${{ steps.meta.outputs.tag }}
                  BRANCH: ${{ steps.target.outputs.branch }}
              run: |
                  set -euo pipefail

                  git add package.json package-lock.json
                  if ! git diff --cached --quiet; then
                    git commit -m "chore: release ${TAG}"
                  fi

                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                    echo "Tag $TAG already exists." >&2
                    exit 1
                  fi

                  git tag -a "$TAG" -m "$TAG"
                  git push origin "HEAD:${BRANCH}"
                  git push origin "$TAG"

            - name: Check whether version already exists on npm
              id: npm_check
              env:
                  PACKAGE_NAME: ${{ steps.meta.outputs.package_name }}
                  VERSION: ${{ steps.meta.outputs.version }}
              run: |
                  set -euo pipefail
                  if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
                    echo "already_published=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "already_published=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Publish npm package (OIDC)
              if: steps.meta.outputs.package_private != 'true' && steps.npm_check.outputs.already_published != 'true'
              run: npm publish --access public --provenance

            - name: Skip npm publish for private package
              if: steps.meta.outputs.package_private == 'true'
              run: echo "Skipping npm publish because package.json has private=true."

            - name: Create GitHub release
              uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
              with:
                  tag_name: ${{ steps.meta.outputs.tag }}
                  name: ${{ steps.meta.outputs.tag }}
                  generate_release_notes: true
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Release summary
              if: ${{ !cancelled() }}
              run: |
                  {
                    echo "## Release Summary"
                    echo ""
                    echo "- Tag: \`${{ steps.meta.outputs.tag }}\`"
                    echo "- Version: \`${{ steps.meta.outputs.version }}\`"
                    echo "- Package: \`${{ steps.meta.outputs.package_name }}\`"
                    echo "- Package private: \`${{ steps.meta.outputs.package_private }}\`"
                    echo "- npm already published: \`${{ steps.npm_check.outputs.already_published }}\`"
                    echo "- Assets expected in repo path: \`fonts/woff2/**\`"
                    echo ""
                    echo "Raw GitHub URL pattern:"
                    echo "\`https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.meta.outputs.tag }}/fonts/woff2/...\`"
                  } >> "$GITHUB_STEP_SUMMARY"
