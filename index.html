<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            content="width=device-width, initial-scale=1.0"
            name="viewport"
        />
        <title>nerd-font-woff2 index</title>
        <script
            async
            src="https://www.googletagmanager.com/gtag/js?id=G-18DR1S6R1T"
        ></script>
        <script>
            (function (w, d, s, l, i) {
                w[l] = w[l] || [];
                w[l].push({
                    "gtm.start": Date.now(),

                const j = d.createElement(s);

            globalThis.dataLayer = globalThis.dataLayer || [];
            function gtag() {
                globalThis.dataLayer.push(arguments);
            }
            gtag("js", new Date());

        <style>
            :root {
                --bg: #0b1020;
                --bg-soft: #111a32;
                --card: #151f3a;
                --text: #f3f6ff;
                --muted: #a8b5d6;
                --accent: #5aa9ff;
                --accent-2: #66f0c4;
                --border: #27345a;
                --shadow: rgba(2, 8, 24, 0.45);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                color: var(--text);
                background:
                    radial-gradient(
                        circle at top right,
                        #1a2b57 0%,
                        transparent 40%
                    ),
                    radial-gradient(
                        circle at 20% -10%,
                        #193d66 0%,
                        transparent 30%
                    ),
                    var(--bg);
                font-family:
                    Inter,
                    Segoe UI,
                    Roboto,
                    Helvetica,
                    Arial,
                    sans-serif;
            }

            .header,
            .main {
                max-width: 1280px;
                margin: 0 auto;
                padding: 1.25rem;
            }

            .hero {
                padding: 1.5rem;
                border: 1px solid var(--border);
                border-radius: 1rem;
                background: linear-gradient(
                    145deg,
                    rgba(33, 50, 92, 0.55),
                    rgba(17, 26, 50, 0.9)
                );
                box-shadow: 0 18px 45px var(--shadow);
            }

            .hero h1 {
                margin: 0 0 0.5rem;
                font-size: clamp(1.6rem, 2.7vw, 2.4rem);
                letter-spacing: 0.02em;
            }

            .hero p {
                margin: 0;
                color: var(--muted);
                max-width: 72ch;
                line-height: 1.5;
            }

            .stats {
                margin-top: 1rem;
                display: flex;
                gap: 0.75rem;
                flex-wrap: wrap;
            }

            .stat-pill {
                border: 1px solid var(--border);
                background: rgba(21, 31, 58, 0.75);
                border-radius: 999px;
                padding: 0.35rem 0.75rem;
                color: var(--muted);
                font-size: 0.85rem;
            }

            .controls {
                display: grid;
                gap: 0.9rem;
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                margin-top: 1.25rem;
                border: 1px solid var(--border);
                border-radius: 0.9rem;
                background: rgba(17, 26, 50, 0.8);
                padding: 0.9rem;
            }

            label {
                display: grid;
                gap: 0.4rem;
                color: var(--muted);
                font-size: 0.88rem;
            }

            input {
                padding: 0.65rem 0.8rem;
                border-radius: 0.5rem;
                border: 1px solid var(--border);
                background: var(--card);
                color: var(--text);
                outline: none;
            }

            input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(90, 169, 255, 0.25);
            }

            .layout {
                display: grid;
                grid-template-columns: 260px 1fr;
                gap: 1rem;
                margin-top: 1rem;
            }

            .family-nav {
                border: 1px solid var(--border);
                border-radius: 0.75rem;
                background: rgba(17, 26, 50, 0.8);
                padding: 0.8rem;
                max-height: 70vh;
                overflow: auto;
                position: sticky;
                top: 1rem;
            }

            .family-nav h2 {
                margin: 0 0 0.5rem;
                font-size: 0.95rem;
                color: var(--accent-2);
            }

            .family-nav ul {
                list-style: none;
                margin: 0;
                padding: 0;
                display: grid;
                gap: 0.25rem;
            }

            .family-nav a {
                color: var(--muted);
                text-decoration: none;
                font-size: 0.86rem;
                padding: 0.28rem 0.4rem;
                border-radius: 0.4rem;
                display: block;
            }

            .family-nav a:hover {
                background: rgba(90, 169, 255, 0.15);
                color: var(--text);
            }

            .results {
                display: grid;
                gap: 0.9rem;
            }

            .status {
                margin: 0.5rem 0 0;
                color: var(--muted);
            }

            .family {
                scroll-margin-top: 1rem;
                border: 1px solid var(--border);
                border-radius: 0.75rem;
                background: rgba(21, 31, 58, 0.92);
                overflow: hidden;
                box-shadow: 0 8px 18px var(--shadow);
            }

            .family > summary {
                cursor: pointer;
                padding: 0.85rem 1rem;
                font-weight: 700;
                background: linear-gradient(145deg, #1b2748, #13203c);
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 0.5rem;
            }

            .files {
                display: grid;
                gap: 0.5rem;
                padding: 0.75rem;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }

            .file {
                border: 1px solid var(--border);
                border-radius: 0.5rem;
                padding: 0.6rem;
                background: rgba(16, 23, 44, 0.85);
                display: grid;
                gap: 0.3rem;
            }

            .file-name {
                font-family: Consolas, monospace;
                font-size: 0.85rem;
                color: #d2e0ff;
                word-break: break-word;
            }

            .file a {
                color: var(--accent);
                text-decoration: none;
                font-size: 0.82rem;
                word-break: break-all;
            }

            .file a:hover {
                text-decoration: underline;
            }

            @media (max-width: 980px) {
                .layout {
                    grid-template-columns: 1fr;
                }

                .family-nav {
                    position: static;
                    max-height: 260px;
                }
            }

            .gtm-hidden {
                display: none;
                visibility: hidden;
            }
        </style>
        <meta
            content="Searchable browser for Nerd Fonts WOFF2 assets published in this repository."
            name="description"
        />

        <meta
            content="nerd-font-woff2 browser"
            property="og:title"
        />

        <meta
            content="website"
            property="og:type"
        />
        <meta
            content="https://nick2bad4u.github.io/nerd-fonts-woff2/"
            property="og:url"
        />

        <meta
            content="https://nick2bad4u.github.io/nerd-fonts-woff2/assets/logo.png"
            property="og:image"
        />
    </head>
    <body>
        <noscript>
            <iframe
                class="gtm-hidden"
                height="0"
                src="https://www.googletagmanager.com/ns.html?id=GTM-T8J6HPLF"
                title="Google Tag Manager"
                width="0"
            ></iframe>
        </noscript>

        <header class="header">
            <section class="hero">
                <h1>nerd-font-woff2 browser</h1>
                <p>
                    Browse, search, and copy links for all generated WOFF2
                    assets in this repository. Data source:
                    <code>fonts/woff2/index.json</code>.
                </p>
                <div class="stats">
                    <span
                        id="stat_families"
                        class="stat-pill"
                        >Families: -</span
                    >
                    <span
                        id="stat_files"
                        class="stat-pill"
                        >Files: -</span
                    >
                    <span
                        id="stat_version"
                        class="stat-pill"
                        >Version: main</span
                    >
                </div>
            </section>
        </header>

        <main class="main">
            <section class="controls">
                <label>
                    Search family/file
                    <input
                        id="search"
                        type="search"
                        placeholder="JetBrainsMono or Regular"
                    />
                </label>
                <label>
                    Version/tag for CDN links
                    <input
                        id="version"
                        type="text"
                        value="main"
                    />
                </label>
            </section>

            <p
                id="status"
                class="status"
                >Loading index...</p
            >

            <section class="layout">
                <aside
                    class="family-nav"
                    aria-label="Font families navigation"
                >
                    <h2>Families</h2>
                    <ul id="family_links"></ul>
                </aside>

                <section
                    id="results"
                    class="results"
                    aria-live="polite"
                ></section>
            </section>
        </main>

        <script
            type="module"
            src="./assets/font-index.js"
        ></script>
    </body>
</html>
